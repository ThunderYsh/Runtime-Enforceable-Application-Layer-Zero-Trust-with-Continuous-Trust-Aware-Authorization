{% extends "base.html" %}
{% block title %}Access Restricted{% endblock %}

{% block content %}
<div class="text-center p-10">
  <div class="bg-gray-800 rounded-lg shadow-xl inline-block px-8 py-10">
    <h1 class="text-3xl font-bold text-red-500 mb-4">🚫 Access Restricted</h1>
    <p class="text-gray-300 text-lg mb-6">
      You are not authorized to access the developer or admin panel.
    </p>
    <button 
      onclick="window.location.href='{% url 'dashboard' %}'"
      class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-3 rounded-lg text-lg font-semibold transition">
      Return to Dashboard
    </button>
  </div>
</div>

<script>
  // Optional: auto popup effect or smooth fade
  document.addEventListener('DOMContentLoaded', () => {
    document.body.classList.add('fade-in');
  });
</script>

<style>
  body.fade-in { 
    animation: fadeIn 0.5s ease-in; 
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
{% endblock %}
