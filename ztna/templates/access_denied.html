{% extends "base.html" %}
{% block title %}Access Denied{% endblock %}

{% block content %}
<div class="text-center p-10">
    <h1 class="text-3xl font-bold text-red-500 mb-4">Access Denied</h1>
    <p class="text-gray-300 text-lg">{{ reason }}</p>

    <a href="{% url 'dashboard' %}" 
       class="mt-6 inline-block bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-white">
        Return to Dashboard
    </a>
</div>
{% endblock %}
