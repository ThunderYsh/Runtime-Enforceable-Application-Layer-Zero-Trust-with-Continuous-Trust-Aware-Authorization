{% extends 'base.html' %}
{% block title %}Policies{% endblock %}
{% block content %}
<h2 class="text-2xl font-bold mb-6 text-center">Active Policies</h2>
<table class="w-full border border-gray-700">
  <tr class="bg-gray-700 text-left">
    <th class="p-2">Feature</th>
    <th class="p-2">Access</th>
  </tr>
  {% for p in policies %}
  <tr class="border-t border-gray-600">
    <td class="p-2">{{ p.policy }}</td>
    <td class="p-2 {% if p.status == 'Allowed' %}text-green-400{% else %}text-red-400{% endif %}">{{ p.status }}</td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
