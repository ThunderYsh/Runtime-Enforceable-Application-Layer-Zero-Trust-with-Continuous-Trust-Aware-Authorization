{% extends "base.html" %}
{% block content %}

<div class="max-w-lg mx-auto bg-gray-800 p-6 rounded-lg mt-12 text-white text-center">

    <h2 class="text-2xl font-semibold mb-4">This file is locked 🔒</h2>
    <p class="text-gray-300 mb-4">Enter the password to view: <b>{{ file.name }}</b></p>

    {% if error %}
        <p class="text-red-400 mb-3">{{ error }}</p>
    {% endif %}

    <form method="GET">
        <input type="password" name="pwd"
               class="w-full p-3 bg-gray-700 rounded mb-4"
               placeholder="File password" required>
        <button class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded">
            Unlock
        </button>
    </form>

</div>

{% endblock %}
