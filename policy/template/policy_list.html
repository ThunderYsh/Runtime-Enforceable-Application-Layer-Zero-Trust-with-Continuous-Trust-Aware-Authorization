{% extends "base.html" %}
{% block content %}

<div class="max-w-5xl mx-auto mt-8">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-white">Policies</h1>

        <button id="newPolicyBtn"
            class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded text-white">
            + New Policy
        </button>
    </div>

    <table class="w-full bg-gray-900 text-white rounded shadow-lg">
        <thead class="bg-gray-800">
            <tr>
                <th class="p-3 text-left">Name</th>
                <th class="p-3">Sensitivity</th>
                <th class="p-3">Status</th>
                <th class="p-3">Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for p in policies %}
            <tr class="border-b border-gray-800 hover:bg-gray-800 transition">
                <td class="p-3">{{ p.name }}</td>
                <td class="p-3">
                    <span class="px-2 py-1 rounded bg-gray-700">{{ p.sensitivity }}</span>
                </td>
                <td class="p-3">
                    {% if p.status == "active" %}
                        <span class="px-2 py-1 rounded bg-green-700">Active</span>
                    {% else %}
                        <span class="px-2 py-1 rounded bg-red-700">Disabled</span>
                    {% endif %}
                </td>
                <td class="p-3 flex gap-3">
                    <a href="{% url 'policy_detail' p.id %}"
                       class="text-blue-400 hover:underline">Open</a>

                    <button onclick="deletePolicy({{ p.id }})"
                        class="text-red-400 hover:text-red-300">Delete</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>


<!-- NEW POLICY MODAL -->
<div id="modal"
     class="hidden fixed inset-0 bg-black bg-opacity-70 flex justify-center items-center">
    <div class="bg-gray-800 p-6 rounded w-1/2">
        <h2 class="text-xl font-bold text-white mb-3">Create Policy</h2>

        <input id="pName" class="w-full p-2 bg-gray-700 text-white rounded mb-3"
               placeholder="Name">

        <textarea id="pDesc" class="w-full p-2 bg-gray-700 text-white rounded mb-3"
                  placeholder="Description"></textarea>

        <input id="pSens" type="number" min="1" max="10" value="3"
               class="w-full p-2 bg-gray-700 text-white rounded mb-3">

        <button id="savePolicy"
                class="bg-green-600 hover:bg-green-700 px-4 py-2 text-white">
            Save
        </button>

        <button id="closeModal"
                class="bg-red-600 hover:bg-red-700 px-4 py-2 text-white float-right">
            Close
        </button>
    </div>
</div>


<script>
// Modal open/close
document.getElementById("newPolicyBtn").onclick = () =>
    document.getElementById("modal").classList.remove("hidden");

document.getElementById("closeModal").onclick = () =>
    document.getElementById("modal").classList.add("hidden");

// Save
document.getElementById("savePolicy").onclick = async () => {
    const payload = {
        name: document.getElementById("pName").value,
        description: document.getElementById("pDesc").value,
        sensitivity: parseInt(document.getElementById("pSens").value)
    };

    const res = await fetch("{% url 'api_policy_create' %}", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": "{{ csrf_token }}"
        },
        body: JSON.stringify(payload)
    });

    if (res.ok) location.reload();
    else alert("Error creating policy");
};

async function deletePolicy(id) {
    if (!confirm("Delete this policy?")) return;

    const res = await fetch(`/policy/api/policy/${id}/delete/`, {
        method: "POST",
        headers: { "X-CSRFToken": "{{ csrf_token }}" }
    });

    if (res.ok) location.reload();
    else alert("Failed to delete");
}
</script>

{% endblock %}
